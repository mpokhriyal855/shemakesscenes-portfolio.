<!DOCTYPE html>
<html>
<body>
  <h1>Video Dimensions</h1>
  <div id="output"></div>
  <script>
    const videos = ['assets/v7.MOV', 'assets/v8.MOV', 'assets/v9.MOV', 'assets/v10.MOV', 'assets/v11.MP4', 'assets/v12.MOV'];
    const output = document.getElementById('output');

    videos.forEach(src => {
      const vid = document.createElement('video');
      vid.src = src;
      vid.onloadedmetadata = () => {
        const div = document.createElement('div');
        div.textContent = `${src} - Width: ${vid.videoWidth}, Height: ${vid.videoHeight}`;
        output.appendChild(div);
      };
    });
  </script>
</body>
</html>
